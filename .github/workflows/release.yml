name: release

# Tag-driven release spine. The maintainer bumps + writes CHANGELOG locally and
# pushes a vX.Y.Z tag; CI reacts. CI never pushes to main and never owns the bump.
#
# Job graph:  guard → build-test → fan-out(publish-npm | publish-vsce | publish-ovsx) → release
#
# Scope: the SPINE (thread: release-pipeline) defines the job graph, gating, and
# the GitHub release; the publish command bodies + idempotency checks are filled
# by the `publishing` thread. Each publish job is skip-if-already-published, so
# re-running the same tag is the first-line recovery for a partial failure.
#
# Dry-run: trigger manually via workflow_dispatch (dry_run: true, the default) to
# exercise guard + build-test + publish wiring without publishing or cutting a
# release — version is read from package.json since there's no tag. See RELEASING.md.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Exercise guard + build-test + publish wiring without publishing or cutting a release'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # ── guard: parse the tag, assert the version is synced everywhere ────────────
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse tag and assert version sync
        id: parse
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # No tag on a manual run — take the version from package.json.
            VERSION="$(node -p "require('./package.json').version")"
            echo "Manual run  ->  version from package.json: $VERSION"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            echo "Release tag: $TAG  ->  version: $VERSION"
          fi
          # The canonical version-source list is owned by `versioning` — all 7
          # version-bearing package.json files; assert every one matches.
          fail=0
          for pkg in package.json \
                     packages/core/package.json \
                     packages/fs/package.json \
                     packages/app/package.json \
                     packages/mcp/package.json \
                     packages/cli/package.json \
                     packages/vscode/package.json; do
            pv="$(node -p "require('./$pkg').version")"
            if [ "$pv" != "$VERSION" ]; then
              echo "::error file=$pkg::version $pv does not match tag $VERSION"
              fail=1
            else
              echo "ok: $pkg = $pv"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "Version mismatch — bump every package.json to $VERSION before tagging."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── build-test: build first (tests import packages/*/dist), then test, then ──
  #    pack the exact tested bytes as artifacts.
  build-test:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build all packages (canonical build)
        run: bash scripts/build-all.sh
      - name: Run full test suite
        run: bash scripts/test-all.sh
      - name: Pack npm tarball (@reslava/loom)
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cd packages/cli
          npm pack --pack-destination "$GITHUB_WORKSPACE/artifacts"
      - name: Package VS Code extension (.vsix)
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cd packages/vscode
          npx @vscode/vsce package --no-dependencies \
            --out "$GITHUB_WORKSPACE/artifacts/loom-vscode-${{ needs.guard.outputs.version }}.vsix"
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

  # ── publish-npm: ship the packed tarball to npm (idempotent) ─────────────────
  publish-npm:
    needs: [guard, build-test]
    runs-on: ubuntu-latest
    # OIDC Trusted Publishing — no NPM_TOKEN. GitHub mints a short-lived id-token
    # that npm (>=11.5.1) exchanges for publish auth, so there is no long-lived
    # secret to leak or rotate. Configure the trusted publisher once on npmjs.com
    # (package @reslava/loom → Settings → Trusted Publisher: repo reslava/loom,
    # workflow release.yml). See RELEASING.md.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for OIDC publish support
        run: npm install -g npm@latest
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
      - name: Skip if this version is already on npm
        id: check
        run: |
          set -euo pipefail
          VERSION="${{ needs.guard.outputs.version }}"
          if [ -n "$(npm view "@reslava/loom@$VERSION" version 2>/dev/null || true)" ]; then
            echo "@reslava/loom@$VERSION already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          TARBALL="artifacts/reslava-loom-${{ needs.guard.outputs.version }}.tgz"
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY-RUN: npm publish --dry-run (nothing is published)"
            npm publish "$TARBALL" --access public --dry-run
          else
            npm publish "$TARBALL" --access public
          fi

  # ── publish-vsce: ship the .vsix to the VS Code Marketplace (idempotent) ─────
  publish-vsce:
    needs: [guard, build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
      - name: Skip if this version is already on the Marketplace
        id: check
        run: |
          set -euo pipefail
          VERSION="${{ needs.guard.outputs.version }}"
          if npx @vscode/vsce show reslava.loom-vscode --json 2>/dev/null \
               | jq -e --arg v "$VERSION" 'any(.versions[]?; .version == $v)' >/dev/null; then
            echo "reslava.loom-vscode@$VERSION already on the Marketplace — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to VS Code Marketplace
        if: steps.check.outputs.skip == 'false'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY-RUN: skipping Marketplace publish (.vsix already built + validated in build-test)."
            exit 0
          fi
          npx @vscode/vsce publish --no-dependencies \
            --packagePath "artifacts/loom-vscode-${{ needs.guard.outputs.version }}.vsix"

  # ── publish-ovsx: ship the same .vsix to Open VSX (idempotent) ───────────────
  publish-ovsx:
    needs: [guard, build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
      - name: Skip if this version is already on Open VSX
        id: check
        run: |
          set -euo pipefail
          VERSION="${{ needs.guard.outputs.version }}"
          if curl -fsSL "https://open-vsx.org/api/reslava/loom-vscode/$VERSION" >/dev/null 2>&1; then
            echo "reslava.loom-vscode@$VERSION already on Open VSX — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to Open VSX
        if: steps.check.outputs.skip == 'false'
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY-RUN: skipping Open VSX publish (.vsix already built + validated in build-test)."
            exit 0
          fi
          # One-time prerequisite (run by hand, not CI; see RELEASING.md):
          #   npx ovsx create-namespace reslava -p "$OVSX_TOKEN"
          npx ovsx publish "artifacts/loom-vscode-${{ needs.guard.outputs.version }}.vsix" -p "$OVSX_TOKEN"

  # ── release: only after all three artifacts are out, cut the GitHub release ──
  release:
    needs: [guard, publish-npm, publish-vsce, publish-ovsx]
    # Tag pushes only — a manual/dry-run never cuts a GitHub release.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG section for this version
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ needs.guard.outputs.version }}"
          # Capture everything under "## [VERSION]" up to the next "## [" header.
          # Literal (index-based) matching — a dynamic regex would treat [X.Y.Z]
          # as a character class and never match.
          section="$(awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { capture=1; next }
            capture && index($0, "## [") == 1 { exit }
            capture { print }
          ' CHANGELOG.md)"
          if [ -z "$(printf '%s' "$section" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG.md section found for [$VERSION] — add it before tagging."
            exit 1
          fi
          {
            echo "body<<__LOOM_EOF__"
            printf '%s\n' "$section"
            echo "__LOOM_EOF__"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.notes.outputs.body }}"
