  <!-- clip outer -->
  <rect x="11.5" y="3" width="9" height="5" rx="2.5" fill="#7D4620"/>
  <!-- clip inner -->
  <rect x="13" y="3.5" width="6" height="3.5" rx="1.75" fill="#9C5E2E"/>
