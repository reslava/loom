  <!-- row 1: label line -->
  <line x1="17.5" y1="15.2" x2="24" y2="15.2" stroke="#FFC85A" stroke-width="2" stroke-linecap="round"/>
  <!-- row 2: checked box -->
  <rect x="8.5" y="21" width="6.5" height="6.5" rx="1.5" fill="#7D4620"/>
  <polyline points="9.8,24.2 11.3,25.9 14,22.2" stroke="#F5A820" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- row 2: label line -->
  <line x1="17.5" y1="24.2" x2="23" y2="24.2" stroke="#FFC85A" stroke-width="2" stroke-linecap="round"/>
</svg>
